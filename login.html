<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Bank Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            /*background-color: #f4f6f8;*/
            text-align: center;
            padding-top: 50px;
            background-image: url("banking.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        .container {
            background: white;
            padding: 25px;
            width: 320px;
            margin: auto;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 10px;
        }

        button {
            padding: 10px;
            width: 85%;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
<div class="container">

<h2>Login</h2>

    <form action="login" method="post">
        Card Number: <input type="text" name="card"><br>
        PIN: <input type="password" name="pin"><br>
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
