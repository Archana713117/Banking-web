<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Change PIN</title>

    <style>
        body {
            font-family: Arial, sans-serif;

            background: url("money.jpg") no-repeat center center fixed;
            background-size: cover;

            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: rgba(255,255,255,0.9);
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0px 0px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background-color: #9b59b6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background-color: #8e44ad;
        }

        .back {
            display: block;
            margin-top: 15px;
            text-decoration: none;
            color: #3498db;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Change PIN 🔐</h2>

    <form action="pinchange" method="post">
        <input type="password" name="newpin" placeholder="Enter new PIN"><br>
        <button type="submit">Update PIN</button>
    </form>

    <a href="/dashboard.html" class="back">Back to Dashboard</a>

</div>

</body>
</html>
